[pytest]
# Limit collection to this repo's tests; the `testbed/` directory vendors large upstream
# projects (and their own pytest suites) that are not meant to be collected here.
testpaths =
    kai/tests
    tests

# Prevent recursive collection in heavy / generated / vendored directories.
norecursedirs =
    testbed
    output
    .venv
    venv
    node_modules
    dist
    build
    __pycache__

addopts =
    -ra

asyncio_mode = auto

