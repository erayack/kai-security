<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Conversation Tree Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e17;
            color: #e4e4e7;
            overflow: hidden;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #tree-panel {
            flex: 1;
            position: relative;
            background: #0f1419;
            border-right: 1px solid #1f2937;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(15, 20, 25, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            backdrop-filter: blur(10px);
        }

        #controls h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #9ca3af;
            font-weight: 500;
        }

        #controls button {
            background: #1f2937;
            border: 1px solid #374151;
            color: #e4e4e7;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        #controls button:hover {
            background: #374151;
            border-color: #4b5563;
        }

        #file-input {
            margin: 10px 0;
        }

        #file-input input[type="file"] {
            display: none;
        }

        #file-input label {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
            transition: all 0.2s;
        }

        #file-input label:hover {
            background: #2563eb;
        }

        #detail-panel {
            width: 500px;
            background: #0f1419;
            overflow-y: auto;
            border-left: 1px solid #1f2937;
            display: none;
        }

        #detail-panel.visible {
            display: block;
        }

        #detail-content {
            padding: 30px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #1f2937;
            border: 1px solid #374151;
            color: #e4e4e7;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #374151;
        }

        .node-details h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 10px;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .detail-item {
            padding: 8px 12px;
            background: #1a1f2e;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #3b82f6;
        }

        .detail-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: #e4e4e7;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            background: #1a1f2e;
            border-radius: 6px;
            border-left: 3px solid #6b7280;
        }

        .message.user {
            border-left-color: #3b82f6;
        }

        .message.assistant {
            border-left-color: #10b981;
        }

        .message.tool {
            border-left-color: #f59e0b;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .message-role {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message.user .message-role { color: #3b82f6; }
        .message.assistant .message-role { color: #10b981; }
        .message.tool .message-role { color: #f59e0b; }

        .message-content {
            font-size: 13px;
            line-height: 1.6;
            color: #d1d5db;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .badge.critical { background: #991b1b; color: #fecaca; }
        .badge.high { background: #b45309; color: #fed7aa; }
        .badge.medium { background: #065f46; color: #d1fae5; }
        .badge.low { background: #1e40af; color: #dbeafe; }
        .badge.info { background: #374151; color: #e5e7eb; }

        .node circle {
            cursor: pointer;
            transition: all 0.3s;
        }

        .node circle:hover {
            filter: brightness(1.2);
        }

        .node text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            font-size: 12px;
            pointer-events: none;
            fill: #e4e4e7;
        }

        .link {
            fill: none;
            stroke: #374151;
            stroke-width: 2px;
        }

        .summary-box {
            background: #1a1f2e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #374151;
        }

        .summary-box p {
            line-height: 1.6;
            font-size: 13px;
            color: #d1d5db;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            border: 3px solid #1f2937;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading conversation tree...</p>
    </div>

    <div id="container">
        <div id="tree-panel">
            <div id="controls">
                <h3>Controls</h3>
                <div id="file-input">
                    <input type="file" id="file-selector" accept=".json">
                    <label for="file-selector">📁 Load JSON</label>
                </div>
                <div>
                    <button onclick="zoomIn()">🔍 Zoom In</button>
                    <button onclick="zoomOut()">🔍 Zoom Out</button>
                    <button onclick="resetView()">🎯 Reset View</button>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #6b7280;">
                    <div id="stats"></div>
                </div>
            </div>
            <svg id="tree"></svg>
        </div>

        <div id="detail-panel">
            <button class="close-btn" onclick="closePanel()">×</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        let treeData = null;
        let svg, g, zoom, tree;
        let currentTransform = d3.zoomIdentity;

        // Initialize
        document.getElementById('file-selector').addEventListener('change', handleFileSelect);
        
        // Try to load default file if available
        loadDefaultFile();

        function loadDefaultFile() {
            const defaultPath = 'output/gmx-solana-455eb63f/convo_e705dec5-1bfe-4ecd-9aaa-5d834899f41f.json';
            fetch(defaultPath)
                .then(response => response.json())
                .then(data => {
                    processData(data);
                    hideLoading();
                })
                .catch(err => {
                    console.log('No default file found, waiting for user to upload');
                    hideLoading();
                });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    processData(data);
                } catch (err) {
                    alert('Error parsing JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function processData(data) {
            treeData = convertToTreeFormat(data);
            renderTree();
            updateStats(data);
        }

        function convertToTreeFormat(data) {
            const node = {
                name: `Agent (Depth ${data.depth})`,
                id: data.agent_id,
                depth: data.depth,
                scope: data.scope_paths ? data.scope_paths[0] : data.repo_path,
                messages: data.messages,
                messageCount: data.message_count || data.messages.length,
                exploits: countExploits(data),
                children: []
            };

            if (data.sub_agent_reports && data.sub_agent_reports.length > 0) {
                node.children = data.sub_agent_reports.map(report => 
                    convertSubReportToNode(report)
                );
            }

            return node;
        }

        function convertSubReportToNode(report) {
            // Count exploits from the actual conversation, not exploits_found
            // (exploits_found may include exploits from other agents due to shared file)
            const actualExploits = report.conversation ? countExploitsFromConversation(report.conversation) : 0;
            
            const node = {
                name: `Sub-Agent (Depth ${report.depth})`,
                id: report.agent_id,
                depth: report.depth,
                scope: report.scope_path,
                task: report.task_description,
                turns: `${report.turns_used}/${report.turns_allocated}`,
                exploits: actualExploits,
                exploitsFoundArray: report.exploits_found.length, // Keep original for reference
                filesExplored: report.files_explored.length,
                summary: report.summary,
                messages: report.conversation || [],
                complete: report.exploration_complete,
                children: []
            };

            if (report.sub_reports && report.sub_reports.length > 0) {
                node.children = report.sub_reports.map(subReport => 
                    convertSubReportToNode(subReport)
                );
            }

            return node;
        }

        function countExploitsFromConversation(messages) {
            // Count actual add_exploit() calls in assistant messages
            let count = 0;
            const exploitRegex = /add_exploit\s*\(/g;
            
            messages.forEach(msg => {
                if (msg.role === 'assistant' && msg.content) {
                    const matches = msg.content.match(exploitRegex);
                    if (matches) {
                        count += matches.length;
                    }
                }
            });
            
            return count;
        }

        function countExploits(data) {
            // Count exploits from add_exploit calls in assistant messages
            return data.messages ? countExploitsFromConversation(data.messages) : 0;
        }

        function renderTree() {
            const width = document.getElementById('tree-panel').clientWidth;
            const height = document.getElementById('tree-panel').clientHeight;

            // Clear existing
            d3.select('#tree').selectAll('*').remove();

            svg = d3.select('#tree')
                .attr('width', width)
                .attr('height', height);

            g = svg.append('g');

            // Setup zoom
            zoom = d3.zoom()
                .scaleExtent([0.1, 3])
                .on('zoom', (event) => {
                    currentTransform = event.transform;
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            // Create tree layout
            tree = d3.tree().size([height - 100, width - 300]);

            // Create hierarchy
            const root = d3.hierarchy(treeData);
            const treeLayout = tree(root);

            // Draw links
            g.selectAll('.link')
                .data(treeLayout.links())
                .enter()
                .append('path')
                .attr('class', 'link')
                .attr('d', d3.linkHorizontal()
                    .x(d => d.y + 150)
                    .y(d => d.x + 50)
                );

            // Draw nodes
            const node = g.selectAll('.node')
                .data(treeLayout.descendants())
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.y + 150},${d.x + 50})`)
                .on('click', (event, d) => showDetails(d.data));

            // Node circles
            node.append('circle')
                .attr('r', d => d.data.depth === 0 ? 12 : 8)
                .style('fill', d => {
                    if (d.data.depth === 0) return '#3b82f6';
                    if (d.data.exploits > 0) return '#10b981';
                    return '#6b7280';
                })
                .style('stroke', '#1f2937')
                .style('stroke-width', 2);

            // Node labels
            node.append('text')
                .attr('dy', -20)
                .attr('text-anchor', 'middle')
                .style('font-size', '11px')
                .style('font-weight', 600)
                .text(d => d.data.name);

            // Scope labels
            node.append('text')
                .attr('dy', 30)
                .attr('text-anchor', 'middle')
                .style('font-size', '10px')
                .style('fill', '#9ca3af')
                .text(d => {
                    const scope = d.data.scope || '';
                    return scope.length > 30 ? '...' + scope.slice(-27) : scope;
                });

            // Exploit count badges
            node.filter(d => d.data.exploits > 0)
                .append('text')
                .attr('dy', 45)
                .attr('text-anchor', 'middle')
                .style('font-size', '10px')
                .style('fill', '#10b981')
                .text(d => `${d.data.exploits} exploits`);

            // Reset view to fit
            resetView();
        }

        function showDetails(data) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            
            let html = `
                <div class="node-details">
                    <h2>${data.name}</h2>
                    
                    <div class="detail-section">
                        <h3>Overview</h3>
                        <div class="detail-item">
                            <div class="detail-label">Agent ID</div>
                            <div class="detail-value">${data.id.substring(0, 8)}...</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Depth</div>
                            <div class="detail-value">${data.depth}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Scope</div>
                            <div class="detail-value">${data.scope || 'Full repository'}</div>
                        </div>
            `;

            if (data.task) {
                html += `
                        <div class="detail-item">
                            <div class="detail-label">Task</div>
                            <div class="detail-value">${data.task}</div>
                        </div>
                `;
            }

            if (data.turns) {
                html += `
                        <div class="detail-item">
                            <div class="detail-label">Turns Used</div>
                            <div class="detail-value">${data.turns}</div>
                        </div>
                `;
            }

            html += `
                        <div class="detail-item">
                            <div class="detail-label">Exploits Found</div>
                            <div class="detail-value">${data.exploits || 0}</div>
                        </div>
                    </div>
            `;

            if (data.summary) {
                html += `
                    <div class="detail-section">
                        <h3>Summary</h3>
                        <div class="summary-box">
                            <p>${data.summary}</p>
                        </div>
                    </div>
                `;
            }

            if (data.messages && data.messages.length > 0) {
                html += `
                    <div class="detail-section">
                        <h3>Conversation (${data.messages.length} messages)</h3>
                        <div style="max-height: 600px; overflow-y: auto;">
                `;

                data.messages.slice(0, 50).forEach((msg, idx) => {
                    const content = msg.content.length > 500 
                        ? msg.content.substring(0, 500) + '...' 
                        : msg.content;
                    
                    html += `
                        <div class="message ${msg.role}">
                            <div class="message-header">
                                <span class="message-role">${msg.role}</span>
                                <span style="font-size: 11px; color: #6b7280;">#${idx + 1}</span>
                            </div>
                            <div class="message-content">${escapeHtml(content)}</div>
                        </div>
                    `;
                });

                if (data.messages.length > 50) {
                    html += `<p style="text-align: center; color: #6b7280; margin: 10px;">... and ${data.messages.length - 50} more messages</p>`;
                }

                html += `</div></div>`;
            }

            html += `</div>`;

            content.innerHTML = html;
            panel.classList.add('visible');
        }

        function closePanel() {
            document.getElementById('detail-panel').classList.remove('visible');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }

        function resetView() {
            if (!svg) return;
            
            const bounds = g.node().getBBox();
            const parent = svg.node().parentElement;
            const fullWidth = parent.clientWidth;
            const fullHeight = parent.clientHeight;
            const width = bounds.width;
            const height = bounds.height;
            
            const midX = bounds.x + width / 2;
            const midY = bounds.y + height / 2;
            
            const scale = 0.8 / Math.max(width / fullWidth, height / fullHeight);
            const translate = [fullWidth / 2 - scale * midX, fullHeight / 2 - scale * midY];
            
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
        }

        function updateStats(data) {
            const totalSubAgents = countSubAgents(data);
            const totalExploits = countTotalExploits(data);
            
            document.getElementById('stats').innerHTML = `
                <strong>Total Sub-Agents:</strong> ${totalSubAgents}<br>
                <strong>Total Exploits:</strong> ${totalExploits}
            `;
        }

        function countSubAgents(data) {
            let count = 0;
            if (data.sub_agent_reports) {
                count += data.sub_agent_reports.length;
                data.sub_agent_reports.forEach(report => {
                    count += countSubAgents(report);
                });
            }
            return count;
        }

        function countTotalExploits(data) {
            let count = countExploits(data);
            if (data.sub_agent_reports) {
                data.sub_agent_reports.forEach(report => {
                    // Count from conversation, not exploits_found array
                    if (report.conversation) {
                        count += countExploitsFromConversation(report.conversation);
                    }
                    // Recursively count nested sub-reports
                    count += countTotalExploits(report);
                });
            }
            return count;
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (treeData) renderTree();
        });
    </script>
</body>
</html>
