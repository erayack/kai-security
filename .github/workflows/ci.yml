name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["dev", "master"]
    paths: ["src/**", "tests/**", "pyproject.toml", ".github/workflows/ci.yml"]
  push:
    branches: ["dev", "master"]
    paths: ["src/**", "tests/**", "pyproject.toml", ".github/workflows/ci.yml"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uvx ruff check src

      - name: Typecheck (ty)
        run: uvx ty check src
